esphome:
  name: voice-assistant
  friendly_name: Voice assistant

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "R2iV3Cuc+P9gXfcOKZiR/pYnqE1fDyUBjXqoBMwdVm4="

ota:
  - platform: esphome
    password: "bee9620533a9ceb1bcd9e68c3a73b3b6"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Voice-Assistant Fallback Hotspot"
    password: "K8SjwEbvER5X"

captive_portal:

micro_wake_word:
  id: mww
  models:
    - model: hey_jarvis


voice_assistant:
  id: va
  microphone: my_mic
  speaker: my_speaker
  

  use_wake_word: true
  micro_wake_word: mww 

  
  on_wake_word_detected:
    - light.turn_on:
        id: led_strip
        blue: 100%
        effect: "Pulse"
  on_listening:
    - light.turn_on:
        id: led_strip
        blue: 100%
        effect: "Pulse"
  on_stt_end:
    - light.turn_on:
        id: led_strip
        green: 100%
        effect: "None"
  on_tts_start:
    - light.turn_on:
        id: led_strip
        white: 100%
        brightness: 50%
  on_tts_end:
    - light.turn_off: led_strip
  on_error:
    - light.turn_on:
        id: led_strip
        red: 100%
    - delay: 2s
    - light.turn_off: led_strip

# Defining two independent I2S buses
i2s_audio:
  - id: i2s_in
    i2s_lrclk_pin: GPIO6
    i2s_bclk_pin: GPIO5
  
  - id: i2s_out
    i2s_lrclk_pin: GPIO15
    i2s_bclk_pin: GPIO16

# INMP441 Microphone
microphone:
  - platform: i2s_audio
    id: my_mic
    i2s_audio_id: i2s_in
    i2s_din_pin: GPIO7
    adc_type: external
    pdm: false

# MAX98357A Amplifier
speaker:
  - platform: i2s_audio
    id: my_speaker
    i2s_audio_id: i2s_out
    i2s_dout_pin: GPIO17
    dac_type: external

# LED strip
light:
  - platform: esp32_rmt_led_strip
    id: led_strip
    name: "Assistant Light"
    pin: GPIO48
    num_leds: 16
    rgb_order: GRB
    chipset: WS2812
    effects:
      - pulse:
          name: "Pulse"
    
# Capacitive button (mute button)
esp32_touch:
  setup_mode: false

binary_sensor:
  - platform: esp32_touch
    name: "Assistant Touch Button"
    pin: GPIO1
    threshold: 500
    on_press:
      - voice_assistant.start:
    on_release:
      - voice_assistant.stop:
